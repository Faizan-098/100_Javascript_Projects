          <p class="text-white/80 text-md">

          </p>
        </div>

          class="w-full border border-white rounded-md p-2 outline-none bg-black/50"

        ></select>

          class="rounded-md p-1 py-2 text-sm bg-black/50 w-full overflow-hidden"
        >
         
        </div>

        <!-- Avatar-Actions -->
        <div class="flex items-center justify-center gap-4">
          <button
            class="flex-1 hover:scale-105 text-sm md:text-[16px]  hover:transition-transform cursor-pointer rounded-md bg-black/60 shadow shadow-lg py-2"
            id="changeAvatar"
          >
            Change
          </button>
          <button
            class="flex-1 hover:scale-105 text-sm md:text-[16px]  hover:transition-transform cursor-pointer rounded-md bg-black/60 shadow shadow-lg py-2"
            id="downloadAvatar"
          >
            Download
          </button>
          <button
            class="flex-1 hover:scale-105 text-sm md:text-[16px]   hover:transition-transform cursor-pointer rounded-md bg-black/60 shadow shadow-lg py-2"
            id="copyAvatar"

            Copy
