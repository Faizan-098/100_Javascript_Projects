<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot - Pro UI</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Load the emoji-mart script from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      /* Custom lightweight scrollbar for a premium feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4b5563;
      }

      /* Prevents text selection outside of messages */
      .no-select {
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
    <script defer src="./app.js"></script>
  </head>

  <body
    class="bg-gray-950 text-gray-100 h-screen flex overflow-hidden font-sans selection:bg-purple-500/30"
  >

    <!-- ASIDE BAR -->
    <aside
      id="sidebar"
      class="fixed inset-y-0 left-0 w-72 border-r border-gray-800 bg-gray-950 flex flex-col z-30 transform -translate-x-[300px] md:translate-x-0 md:relative transition-transform duration-300 ease-in-out"
    >
    <i 
    onclick="closeAsidebar()"
    class="ri-close-line md:hidden ms-auto p-2 text-xl cursor-pointer"></i>
      <div class="px-4 md:p-4">
        <button
        id="createChatBtn"
          class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-medium py-3 px-4 rounded-xl transition-all shadow-[0_0_15px_rgba(124,58,237,0.25)] cursor-pointer"
        >
          <i
         
          class="ri-add-line text-xl"></i>
          <span>New Chat</span>
        </button>
      </div>
        
       <p
          class="text-xs px-3  font-semibold text-gray-500 uppercase tracking-wider mb-3 px-2 mt-2 no-select"
        >
          Today
        </p>
      <!-- CHAT-HISTORY -->
      <div
      id="chatHistory"
      class="flex-1 cursor-pointer  overflow-y-auto px-3 py-2 space-y-2 ">
       
        <button
          class="w-full flex items-center gap-3 px-3 py-3 bg-gray-800/60 text-gray-200 rounded-lg group text-left"
        >
          <i class="ri-message-3-line text-purple-400"></i>
          <span class="text-sm truncate font-medium">Dark Mode Chat UI</span>
        </button>
        <button
          class="w-full flex items-center gap-3 px-3 py-3 hover:bg-gray-800/40 text-gray-400 hover:text-gray-200 rounded-lg transition-colors group text-left"
        >
          <i
            class="ri-message-3-line group-hover:text-purple-400 transition-colors"
          ></i>
          <span class="text-sm truncate">Optimizing React State</span>
        </button>
         <button
          class="w-full flex items-center gap-3 px-3 py-3 bg-gray-800/60 text-gray-200 rounded-lg group text-left"
        >
          <i class="ri-message-3-line text-purple-400"></i>
          <span class="text-sm truncate font-medium">Dark Mode Chat UI</span>
        </button>
        <button
          class="w-full flex items-center gap-3 px-3 py-3 hover:bg-gray-800/40 text-gray-400 hover:text-gray-200 rounded-lg transition-colors group text-left"
        >
          <i
            class="ri-message-3-line group-hover:text-purple-400 transition-colors"
          ></i>
          <span class="text-sm truncate">Optimizing React State</span>
        </button>
      </div>

      <div
        class="p-4 border-t border-gray-800 flex items-center gap-3 hover:bg-gray-900 transition-colors cursor-pointer no-select"
      >
        <div
          class="h-10 w-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold shadow-inner"
        >
          SE
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate">Senior Engineer</p>
          <p class="text-xs text-blue-400 truncate">Pro Plan</p>
        </div>
        <i
          class="ri-settings-4-line text-gray-400 hover:text-white transition-colors"
        ></i>
      </div>
    </aside>

  

    <!-- WINDOW -->
    <main class="flex-1 flex flex-col relative bg-[#0B0F19]">
      <!-- HEADER -->
      <header
        class="h-16 flex  items-center justify-between px-4 border-b border-gray-800 bg-gray-950/80 backdrop-blur-md sticky top-0 z-20"
      >
        <button
          class="text-gray-400 md:hidden hover:text-white transition-colors p-2 -ml-2"
        >
          <i 
          onclick="openSidebar()"
          class="ri-menu-2-line text-2xl cursor-pointer"></i>
        </button>
        <span
          class="font-bold tracking-wide text-xl  md:text-2xl bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400"
          >AI Chat Assistant</span
        >
        <button
          class="text-gray-400 hover:text-white transition-colors p-2 -mr-2"
        >
          <i class="ri-add-line text-2xl"></i>
        </button>
      </header>

      <!-- CHAT-MESSAGE-CONTAINER -->
      <div
        id="chatContainer"
        class="flex-1 overflow-y-auto p-4 max-h-[450px] sm:p-6 space-y-8 scroll-smooth pb-32"
      ></div>

      <!-- CHAT-BTN -->
      <div
        class="absolute bottom-0 w-full p-4 sm:p-6 bg-gradient-to-t from-[#0B0F19] via-[#0B0F19] to-transparent pt-12"
      >
        <div class="max-w-4xl mx-auto relative group">
          <div
            class="absolute bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur transition duration-500"
          ></div>

          <div
            class="relative flex items-center justify-center bg-gray-800/90 backdrop-blur-sm border border-gray-700 rounded-2xl flex items-end p-2 shadow-2xl"
          >
            <button
              class="p-3 flex flex-col gap-1 md:flex-row text-gray-400 hover:text-white cursor-pointer transition-colors shrink-0"
            >
              <i class="ri-attachment-2 text-xl"></i>
              <i id="emojiBtn" class="ri-emotion-happy-line text-lg"></i>
            </button>

            <div
              id="picker-container"
              class="absolute bottom-25 left-0 md:left-18"
            ></div>

            <textarea
              id="chatInput"
              rows="1"
              placeholder="Message AI..."
              class="w-full max-h-32 min-h-[74px] bg-transparent text-gray-100 placeholder-gray-500 focus:outline-none resize-none px-2 py-3 text-sm sm:text-base"
              style="height: 44px"
            ></textarea>

            <button
              id="chatBtn"
              class="p-1 my-auto cursor-pointer text-white rounded-xl shadow-lg transition-transform hover:scale-105 shrink-0 flex items-center justify-center h-10 w-10"
            >
              <i class="ri-send-plane-fill text-xl"></i>
            </button>
          </div>

          <p class="text-center text-xs text-gray-500 mt-3 no-select">
            AI can make mistakes. Consider verifying critical code.
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
