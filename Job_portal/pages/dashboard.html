<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script defer src="../JS/dashboard.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="card" style="width: 18rem">
      <img src="../img/avatar.png" class="card-img-top" alt="..." />
      <div class="card-body">
        <h5 id="name" class="card-title">Card title</h5>
        <p id="description" class="card-text">
          Some quick example text to build on the card title and make up the
          bulk of the card’s content.
        </p>
      </div>
      <ul class="list-group list-group-flush">
        <li id="email" class="list-group-item">An item</li>
        <li id="username" class="list-group-item">A third item</li>
      </ul>
      <div class="card-body">
        <button id="logoutBtn" type="button" class="btn btn-danger">
          Logout
        </button>
        <button
          type="button"
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#exampleModal"
          data-bs-whatever="@getbootstrap"
          id="editBtn"
        >
          Edit
        </button>
      </div>
    </div>

    <!-- MODAL -->

    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">
              Edit Profile
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3">
                <input type="file"  class="form-control" id="recipient-name" />
              </div>
              <div class="mb-3">
                <label for="recipient-name" class="col-form-label"
                  >FirstName:</label
                >
                <input id="firstName" type="text" class="form-control" id="recipient-name" />
              </div>

              <div class="mb-3">
                <label for="recipient-name" class="col-form-label"
                  >LastName:</label
                >
                <input id="lastName" type="text" class="form-control" id="recipient-name" />
              </div>

              <div class="mb-3">
                <label for="recipient-name" class="col-form-label"
                  >Email:</label
                >
                <input readonly id="userEmail" type="email"  class="form-control" id="recipient-name" />
              </div>

              <div class="mb-3">
                <label for="recipient-name" class="col-form-label"
                  >userName:</label
                >
                <input id="userName" type="text" class="form-control" id="recipient-name" />
              </div>

              <div class="mb-3">
                <label for="message-text" class="col-form-label"
                  >Description:</label
                >
                <textarea id="userDescription" class="form-control" id="message-text"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button id="updateProfile" type="button" class="btn btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
