<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Storage</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Remix Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Script -->
    <script defer src="./app.js"></script>
  </head>
  <body class="relative  ">
    <!-- IMAGE STORAGE SYSTEM -->
    <div
    
      class="min-h-screen p-5 bg-gradient-to-r from-[#f7971e] to-[#ffd200] flex flex-col items-center justify-start py-12 gap-8"
    >
      <h1 class="font-extrabold text-4xl md:text-5xl text-white text-shadow-lg">
        Image Storage
      </h1>

      <!-- UPLOAD BUTTON -->
      <div
        class="card relative max-w-[600px] py-12 w-full shadow-sm backdrop-blur-sm bg-black/40 overflow-hidden border-dashed border-2 text-white p-4"
      >
        <div class="flex gap-2 flex-col text-center justify-center w-full">
          <i class="ri-upload-cloud-line text-5xl md:text-6xl"></i>
          <span class="text-xl md:text-2xl">Upload your image here</span>
        </div>
        <!-- file -->
        <input
          id="uploadBtn"
          type="file"
           accept="image/*"
          class="w-full h-full absolute left-0 top-0 opacity-0 cursor-pointer"
        />
      </div>

      <!-- IMAGES -->
      <div
      id="cardContainer"
        class="max-w-[1200px] w-full   mx-auto grid grid-sm-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
      >
       

      </div>

      <!-- ERROR -->
       <div id="error"></div>

      </div>
      <!-- LOADING -->
       <div id="spinner" class="w-full h-screen hidden absolute grid place-items-center backdrop-blur-sm  top-0 left-0">
         <span class="loading loading-spinner text-white loading-xl"></span>
       </div>
  </body>
</html>
