<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ThumbFetch</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
    />

    <!-- scripts -->
    <script defer src="./app.js"></script>
  </head>

  <body
    class="min-h-screen text-gray-800 text-white bg-[linear-gradient(316deg,#c45b0c,#351e0f)] bg-[linear-gradient(316deg,#1a0d05,#000000)] transition-all duration-500"
  >
    <!-- HEADER -->

    <header
      class="flex justify-between items-center px-6 py-4 backdrop-blur-md bg-white/10 dark:bg-black/30 border-b border-white/20"
    >
      <div class="flex items-center gap-2">
        <i class="ri-image-circle-ai-line text-4xl font-medium"></i>

        <span class="text-2xl md:text-3xl font-extrabold tracking-wide"
          >ThumbFetch</span
        >
      </div>

      <button
        id="themeToggle"
        class="text-xl md:text-2xl hover:scale-110 transition"
      >
        <i class="ri-moon-line"></i>
      </button>
    </header>

    <!-- MAIN -->

    <main class="max-w-6xl mx-auto px-4 py-12 flex flex-col gap-12">
      <!-- SEARCH BAR -->

      <div class="flex justify-center">
        <div
          class="flex items-center w-full max-w-xl bg-white/20 backdrop-blur-lg rounded-full  px-5 py-3 shadow-lg"
        >
          <i class="ri-search-line text-xl mr-3"></i>

          <input
            id="video-url"
            type="text"
            placeholder="Paste YouTube URL..."
            class="flex-1 bg-transparent outline-none placeholder-white/70 overflow-hidden "
          />

          <button
            id="extract-btn"
            class="md:ml-3  flex items-center  gap-1 md:gap-2 bg-black/70 hover:bg-black text-white px-4 py-2 rounded-full cursor-pointer transition"
          >
            <i class="ri-magic-line"></i>
            Extract
          </button>
        </div>
      </div>

      <!-- CARD GRID -->
      <section id="thumbnails-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
        
      </section>
    </main>
  </body>
</html>
